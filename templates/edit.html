<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a class="nav-link" href="{{ url_for('index') }}">← Back to home</a>
        <h1>Edit Link</h1>
        <p class="subtitle">Update the site name and URL.</p>
      </header>

      <article class="card">
        <form class="form" action="{{ url_for('edit_link', link_index=link_index) }}" method="post">
          <div class="form-field">
            <label for="site_name">Site name</label>
            <input
              id="site_name"
              class="input"
              type="text"
              name="site_name"
              value="{{ link.name }}"
              required
            >
          </div>

          <div class="form-field">
            <label for="url">URL</label>
            <input
              id="url"
              class="input"
              type="url"
              name="url"
              value="{{ link.url }}"
              required
            >
          </div>

          <div class="button-row">
            <button class="button" type="submit">Save Changes</button>
            <a class="button button-secondary" href="{{ url_for('index') }}">Cancel</a>
          </div>
        </form>
      </article>
    </main>
  </body>
</html>
