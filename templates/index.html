<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Links</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a class="nav-link" href="/about">About</a>
        <h1>My Links</h1>
        <p class="subtitle">A simple, clean link-in-bio page.</p>
      </header>

      <section class="stack">
        {% for url in links %}
        <article class="card">
          <a class="card-link" href="{{ url }}">{{ url }}</a>
        </article>
        {% endfor %}
      </section>

      <form class="form" action="#" method="post">
        <div class="form-row">
          <input
            class="input"
            type="url"
            name="new_link"
            placeholder="Add a new URL"
            aria-label="New URL"
          >
          <button class="button" type="submit">Add Link</button>
        </div>
      </form>
    </main>
  </body>
</html>
