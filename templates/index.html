<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Links</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a class="nav-link" href="/about">About</a>
        <h1>My Links</h1>
        <p class="subtitle">A simple, clean link-in-bio page.</p>
      </header>

      <section class="stack">
        {% for link in links %}
        <article class="card">
          <div class="card-header-row">
            <a class="card-link" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">{{ link.name }}</a>
            <div class="actions-row">
              <a class="button button-secondary" href="{{ url_for('edit_link', link_index=loop.index0) }}">Edit</a>
              <form method="post" action="{{ url_for('delete_link', link_index=loop.index0) }}">
                <button class="button button-secondary" type="submit">Delete</button>
              </form>
            </div>
          </div>
          <div class="metadata-columns">
            <div class="metadata-column">
              <p class="metadata-label">Title</p>
              <p class="metadata-value">{{ link.title or 'Not Available' }}</p>
            </div>
            <div class="metadata-column">
              <p class="metadata-label">Description</p>
              <p class="metadata-value">{{ link.description or 'Not Available' }}</p>
            </div>
            <div class="metadata-column">
              <p class="metadata-label">Image URL</p>
              <p class="metadata-value">{{ link.image_url or 'Not Available' }}</p>
            </div>
          </div>
        </article>
        {% endfor %}
      </section>

      <form class="form" action="{{ url_for('add_link') }}" method="post">
        <div class="form-row">
          <input
            class="input"
            type="text"
            name="site_name"
            placeholder="Site name"
            aria-label="Site name"
            required
          >
          <input
            class="input"
            type="url"
            name="url"
            placeholder="https://example.com"
            aria-label="New URL"
            required
          >
          <button class="button" type="submit">Add Link</button>
        </div>
      </form>
    </main>
  </body>
</html>
